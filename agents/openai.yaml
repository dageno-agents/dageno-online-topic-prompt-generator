display_name: Dageno Domain Topic Prompt Generator
short_description: Turn any real customer domain into Dageno-ready GEO Topics and Prompts using crawl, search, and model-led brand research.
default_prompt: Generate a Dageno-ready Topic and Prompt system from this customer domain. Crawl and search first, infer and challenge the business hypotheses, build the Capability Ledger, category-demand map, competitor capability and decision-surface maps, then cover both the complete serviceable-intent universe and the material industry intent universe. Classify every cell and Prompt as brand_core, industry_benchmark, competitive_whitespace, or out_of_scope_reference; assign separate metricUse values so visibility is never inflated by measuring only favorable serviceable questions or distorted by blending unrelated category questions. Return every material non-duplicative monitoring/content Prompt with evidence and deterministic QA. Do not use fixed Topic or Prompt quotas.
