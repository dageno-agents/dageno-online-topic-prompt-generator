display_name: Dageno Online Topic Prompt Generator
short_description: Generate evidence-backed GEO Topic, Prompt, and competitor maps from a customer domain.
default_prompt: Generate Dageno-ready Topic, Prompt, and competitor monitoring assets from this customer domain. Crawl and search first, infer the real business, run category demand search, map competitors by country and business line, then output grouped Topics, high-intent prompts, evidence metadata, QA results, and optional CSV.
