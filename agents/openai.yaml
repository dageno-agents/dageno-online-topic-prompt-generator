display_name: Dageno Domain Topic Prompt Generator
short_description: Turn any real customer domain into Dageno-ready GEO Topics and Prompts using crawl, search, and model-led brand research.
default_prompt: Generate a Dageno-ready Topic and Prompt pool from this customer domain. Crawl and search first, infer and challenge the business hypotheses, build the Capability Ledger and complete applicable serviceable-intent universe, then return the smallest complete Topic set and coverage-selected monitoring/content Prompt pools with evidence and deterministic QA.
