display_name: Dageno Domain Topic Prompt Generator
short_description: Turn any real customer domain into Dageno-ready GEO Topics and Prompts using crawl, search, and model-led brand research.
default_prompt: Generate a Dageno-ready Topic and Prompt system from this customer domain. Crawl and search first, infer and challenge the business hypotheses, build the Capability Ledger, competitive decision-surface map, and complete applicable serviceable-intent universe, then return every material non-duplicative Topic and coverage-selected monitoring/content Prompt pool with evidence and deterministic QA. Do not use fixed Topic or Prompt quotas.
