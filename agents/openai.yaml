display_name: Dageno Online Topic Prompt Generator
short_description: Generate evidence-backed GEO Topic, Prompt, and competitor maps from a customer domain.
default_prompt: Generate Dageno-ready Topic and Prompt assets from this customer domain. Crawl and search first, infer and challenge the real business hypotheses, build a Capability Ledger and the complete applicable serviceable-intent universe, then return the smallest non-overlapping Topic set and coverage-selected monitoring/content Prompt pools with evidence, deterministic QA, and optional CSV.
